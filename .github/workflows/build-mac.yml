name: Build Mac

on:
  push:
    branches: [desktop]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run electron:build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: Tarok-mac
          path: release/*.dmg
          retention-days: 30
